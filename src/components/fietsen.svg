<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <style>
      /* --- CONSTANTE ROTATIES --- */
      @keyframes linearSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes crankSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* TEGEN-ROTATIE (Houdt pedaal vlak) */
      @keyframes counterSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }

      /* --- GEOPTIMALISEERDE BEWEGINGEN VOOR PEDAL CONTACT --- */
      @keyframes thighSwing {
        0%    { transform: rotate(-92.919deg); }
        12.5% { transform: rotate(-90.730deg); }
        25%   { transform: rotate(-72.163deg); }
        37.5% { transform: rotate(-50.767deg); }
        50%   { transform: rotate(-40.495deg); }
        62.5% { transform: rotate(-43.212deg); }
        75%   { transform: rotate(-53.409deg); }
        87.5% { transform: rotate(-72.805deg); }
        100%  { transform: rotate(-92.919deg); }
      }

      /* Scheenbeen: Relatief aan bovenbeen */
      @keyframes shinBend {
        0%    { transform: rotate(119.677deg); }
        12.5% { transform: rotate(97.010deg); }
        25%   { transform: rotate(67.378deg); }
        37.5% { transform: rotate(43.269deg); }
        50%   { transform: rotate(44.990deg); }
        62.5% { transform: rotate(70.479deg); }
        75%   { transform: rotate(99.935deg); }
        87.5% { transform: rotate(121.066deg); }
        100%  { transform: rotate(119.677deg); }
      }
      
      /* Voet blijft vlak op pedaal */
      @keyframes footFlex {
        0%   { transform: rotate(0deg); }
        50%  { transform: rotate(0deg); }
        100% { transform: rotate(0deg); }
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }
      
      /* --- CLASSES --- */
      .rotating-wheel {
        animation: linearSpin 1s linear infinite;
        transform-box: fill-box;
        transform-origin: center;
      }
      
      .crank-axle {
        animation: crankSpin 2s linear infinite;
        transform-box: view-box;
        transform-origin: 0px 0px; 
      }
      
      .pedal-flat {
        animation: counterSpin 2s linear infinite;
        transform-box: view-box;
        transform-origin: 0px 0px; 
      }
      
      .biker-body-bounce {
        animation: bounce 0.5s ease-in-out infinite;
      }

      /* Rechts (Voorgrond) - Start op 0% (Boven) */
      .r-thigh { animation: thighSwing 2s linear infinite; transform-origin: 0 0; }
      .r-shin { animation: shinBend 2s linear infinite; transform-origin: 0 0; }
      .r-foot { animation: footFlex 2s linear infinite; transform-origin: 2 0; }

      /* Links (Achtergrond) - Start op 50% (Onder) */
      .l-thigh { animation: thighSwing 2s linear infinite; transform-origin: 0 0; animation-delay: -1s; }
      .l-shin { animation: shinBend 2s linear infinite; transform-origin: 0 0; animation-delay: -1s; }
      .l-foot { animation: footFlex 2s linear infinite; transform-origin: 2 0; animation-delay: -1s; }
    </style>
  </defs>

  <g id="progress-cyclist" transform="translate(200, 150)">

    <g transform="translate(-24, -35)">
        <g class="l-thigh">
            <line x1="0" y1="0" x2="0" y2="33" stroke="#1F2A36" stroke-width="7" stroke-linecap="round" />
            <g transform="translate(0, 33)">
                <g class="l-shin">
                    <line x1="0" y1="0" x2="0" y2="31" stroke="#1F2A36" stroke-width="6" stroke-linecap="round" />
                    <g transform="translate(0, 31)">
                        <g class="l-foot">
                             <path d="M -5 0 L 10 0 L 10 6 L -5 6 Z" fill="#111" />
                        </g>
                    </g>
                </g>
            </g>
        </g>
    </g>

    <g transform="translate(-5, 15)">
        <g class="crank-axle">
            <line x1="0" y1="0" x2="0" y2="15" stroke="#333" stroke-width="5" stroke-linecap="round" />
            <g transform="translate(0, 15)">
                <g class="pedal-flat">
                     <rect x="-8" y="-3" width="16" height="6" rx="1.5" fill="#222" />
                </g>
            </g>
        </g>
    </g>

    <g stroke="#FF4500" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-35" y1="-25" x2="15" y2="-25" />
      <line x1="-35" y1="-25" x2="-45" y2="15" />
      <line x1="-5" y1="15" x2="-45" y2="15" />
      <line x1="-5" y1="15" x2="-25" y2="-35" /> 
      <line x1="-5" y1="15" x2="15" y2="-25" />  
      <line x1="15" y1="-25" x2="35" y2="15" />
    </g>

    <path d="M 15 -25 L 18 -45 Q 25 -45 28 -38" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    <path d="M -35 -35 C -30 -35 -20 -35 -15 -35 C -15 -30 -35 -30 -35 -35" fill="#333" stroke="#333" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(-45, 15)">
      <g class="rotating-wheel">
        <circle cx="0" cy="0" r="22" fill="none" stroke="#333" stroke-width="6"/>
        <circle cx="0" cy="0" r="19" fill="none" stroke="#CCC" stroke-width="2"/>
        <line x1="0" y1="-19" x2="0" y2="19" stroke="#999" stroke-width="1.5"/>
        <line x1="-19" y1="0" x2="19" y2="0" stroke="#999" stroke-width="1.5"/>
        <line x1="-13.4" y1="-13.4" x2="13.4" y2="13.4" stroke="#999" stroke-width="1.5"/>
        <line x1="-13.4" y1="13.4" x2="13.4" y2="-13.4" stroke="#999" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="4" fill="#333"/>
      </g>
    </g>
    <g transform="translate(35, 15)">
      <g class="rotating-wheel">
        <circle cx="0" cy="0" r="22" fill="none" stroke="#333" stroke-width="6"/>
        <circle cx="0" cy="0" r="19" fill="none" stroke="#CCC" stroke-width="2"/>
        <line x1="0" y1="-19" x2="0" y2="19" stroke="#999" stroke-width="1.5"/>
        <line x1="-19" y1="0" x2="19" y2="0" stroke="#999" stroke-width="1.5"/>
        <line x1="-13.4" y1="-13.4" x2="13.4" y2="13.4" stroke="#999" stroke-width="1.5"/>
        <line x1="-13.4" y1="13.4" x2="13.4" y2="-13.4" stroke="#999" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="4" fill="#333"/>
      </g>
    </g>

    <g transform="translate(-5, 15)">
        <circle r="6" fill="#555" /> 
        <g class="crank-axle">
            <line x1="0" y1="0" x2="0" y2="-15" stroke="#333" stroke-width="5" stroke-linecap="round" />
            <g transform="translate(0, -15)">
                <g class="pedal-flat">
                     <rect x="-8" y="-3" width="16" height="6" rx="1.5" fill="#222" />
                </g>
            </g>
        </g>
    </g>

    <g transform="translate(-24, -35)">
        <g class="r-thigh">
            <line x1="0" y1="0" x2="0" y2="33" stroke="#3498db" stroke-width="7" stroke-linecap="round" />
            <g transform="translate(0, 33)">
                <g class="r-shin">
                    <line x1="0" y1="0" x2="0" y2="31" stroke="#3498db" stroke-width="6" stroke-linecap="round" />
                    <g transform="translate(0, 31)">
                        <g class="r-foot">
                            <path d="M -5 0 L 10 0 L 10 6 L -5 6 Z" fill="#333" />
                        </g>
                    </g>
                </g>
            </g>
        </g>
    </g>

    <g class="biker-body-bounce">
      <path d="M -25 -35 L -10 -35 L 5 -55 L -15 -65 Z" fill="#ff69b4" />
      <line x1="-15" y1="-65" x2="-10" y2="-35" stroke="#ff1493" stroke-width="2"/>
      <path d="M -10 -60 Q 5 -50 20 -42" fill="none" stroke="#ff69b4" stroke-width="6" stroke-linecap="round"/>
      <circle cx="20" cy="-42" r="3" fill="#fAD6b1"/>
      
      <g transform="translate(-12, -75)">
        <path d="M -10 -5 Q -15 15 -18 25 Q -5 20 0 10 Z" fill="#f4d03f"/>
        <circle cx="0" cy="0" r="14" fill="#fAD6b1"/>
        <circle cx="4" cy="-2" r="1.5" fill="#333"/>
        <circle cx="10" cy="-2" r="1.5" fill="#333"/>
        <path d="M 4 4 Q 7 8 10 4" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M -10 -5 Q -12 -15 0 -16 Q 12 -15 12 -5 C 8 -10 0 -10 -10 -5" fill="#f4d03f"/>
        <path d="M -14 0 Q -10 -18 2 -18 Q 14 -18 14 -5 Q 10 -10 4 -10 Q 0 -10 -14 0" fill="#f4d03f"/>
        <path d="M -12 -8 Q -16 5 -15 18 Q -8 10 -10 -2 Z" fill="#f4d03f"/>
      </g>
    </g>
  </g>
</svg>
