<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F6FF"/>
    </linearGradient>

    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#55c595"/>
    </linearGradient>

    <style>
      /* Animations */
      @keyframes spin {
        100% { transform: rotate(360deg); }
      }
      @keyframes pedal {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes treeSway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(4deg); }
      }
      @keyframes moveClouds {
        0% { transform: translateX(-150px); }
        100% { transform: translateX(1100px); }
      }

      /* Animation Classes */
      .sun-rays {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin 15s linear infinite;
      }
      .cloud {
        animation: moveClouds 25s linear infinite;
      }
      .cloud2 {
        animation: moveClouds 35s linear infinite;
        animation-delay: -15s;
      }
      .cloud3 {
        animation: moveClouds 45s linear infinite;
        animation-delay: -5s;
      }
      .tree-group {
        transform-box: fill-box;
        transform-origin: bottom center;
        animation: treeSway 4s ease-in-out infinite;
      }
      .tree-group2 {
        transform-box: fill-box;
        transform-origin: bottom center;
        animation: treeSway 3.5s ease-in-out infinite;
        animation-delay: -1s;
      }
      .wheel {
        transform-box: fill-box;
        transform-origin: center;
        animation: spin 1.5s linear infinite;
      }
      .biker-body {
        animation: bounce 0.75s ease-in-out infinite;
      }
      .crank {
        transform-box: fill-box;
        transform-origin: center;
        animation: pedal 1.5s linear infinite;
      }
    </style>
  </defs>

  <rect width="1000" height="600" fill="url(#skyGrad)"/>

  <g transform="translate(120, 100)">
    <circle cx="0" cy="0" r="40" fill="#FFD700"/>
    <g class="sun-rays" fill="#FFA500">
      <polygon points="-5,-55 5,-55 0,-70" />
      <polygon points="-5,55 5,55 0,70" />
      <polygon points="-55,-5 -55,5 -70,0" />
      <polygon points="55,-5 55,5 70,0" />
      <polygon points="-40,-40 -33,-33 -50,-50" />
      <polygon points="40,40 33,33 50,50" />
      <polygon points="-40,40 -33,33 -50,50" />
      <polygon points="40,-40 33,-33 50,-50" />
    </g>
  </g>

  <g class="cloud" fill="#FFFFFF" opacity="0.9" transform="translate(0, 50)">
    <circle cx="30" cy="30" r="20" />
    <circle cx="60" cy="20" r="25" />
    <circle cx="90" cy="30" r="20" />
    <rect x="30" y="25" width="60" height="25" rx="10" />
  </g>
  <g class="cloud2" fill="#FFFFFF" opacity="0.85" transform="translate(0, 120) scale(0.8)">
    <circle cx="30" cy="30" r="20" />
    <circle cx="60" cy="20" r="25" />
    <circle cx="90" cy="30" r="20" />
    <rect x="30" y="25" width="60" height="25" rx="10" />
  </g>
  <g class="cloud3" fill="#FFFFFF" opacity="0.95" transform="translate(0, 80) scale(1.2)">
    <circle cx="30" cy="30" r="20" />
    <circle cx="60" cy="20" r="25" />
    <circle cx="90" cy="30" r="20" />
    <rect x="30" y="25" width="60" height="25" rx="10" />
  </g>

  <polygon points="0,600 0,500 1000,200 1000,600" fill="url(#mountainGrad)"/>
  
  <g class="tree-group" transform="translate(180, 420)">
    <rect x="-4" y="-30" width="8" height="30" fill="#8B4513" />
    <polygon points="-25,-30 25,-30 0,-80" fill="#2E8B57" />
    <polygon points="-20,-55 20,-55 0,-100" fill="#3CB371" />
  </g>
  <g class="tree-group2" transform="translate(380, 360)">
    <rect x="-5" y="-35" width="10" height="35" fill="#8B4513" />
    <polygon points="-30,-35 30,-35 0,-90" fill="#2E8B57" />
    <polygon points="-25,-65 25,-65 0,-115" fill="#3CB371" />
  </g>
  <g class="tree-group" transform="translate(600, 290) scale(0.85)">
    <rect x="-4" y="-30" width="8" height="30" fill="#8B4513" />
    <polygon points="-25,-30 25,-30 0,-80" fill="#2E8B57" />
    <polygon points="-20,-55 20,-55 0,-100" fill="#3CB371" />
  </g>
  <g class="tree-group2" transform="translate(780, 240)">
    <rect x="-4" y="-30" width="8" height="30" fill="#8B4513" />
    <polygon points="-25,-30 25,-30 0,-80" fill="#2E8B57" />
    <polygon points="-20,-55 20,-55 0,-100" fill="#3CB371" />
  </g>

  <line x1="0" y1="500" x2="1000" y2="200" stroke="#696969" stroke-width="28" />
  <line x1="0" y1="500" x2="1000" y2="200" stroke="#FFD700" stroke-width="4" stroke-dasharray="15,15" />

  <g transform="translate(100, 470)">
    <rect x="-3" y="-50" width="6" height="50" fill="#A0522D" />
    <rect x="-30" y="-70" width="60" height="25" rx="3" fill="#FFE4B5" stroke="#8B4513" stroke-width="2"/>
    <text x="0" y="-53" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#8B0000" text-anchor="middle">START</text>
  </g>
  <g transform="translate(300, 410)">
    <rect x="-3" y="-50" width="6" height="50" fill="#A0522D" />
    <rect x="-25" y="-70" width="50" height="25" rx="3" fill="#FFE4B5" stroke="#8B4513" stroke-width="2"/>
    <text x="0" y="-53" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#006400" text-anchor="middle">25%</text>
  </g>
  <g transform="translate(500, 350)">
    <rect x="-3" y="-50" width="6" height="50" fill="#A0522D" />
    <rect x="-25" y="-70" width="50" height="25" rx="3" fill="#FFE4B5" stroke="#8B4513" stroke-width="2"/>
    <text x="0" y="-53" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#006400" text-anchor="middle">50%</text>
  </g>
  <g transform="translate(700, 290)">
    <rect x="-3" y="-50" width="6" height="50" fill="#A0522D" />
    <rect x="-25" y="-70" width="50" height="25" rx="3" fill="#FFE4B5" stroke="#8B4513" stroke-width="2"/>
    <text x="0" y="-53" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#006400" text-anchor="middle">75%</text>
  </g>
  <g transform="translate(900, 230)">
    <rect x="-4" y="-80" width="8" height="80" fill="#696969" />
    <rect x="4" y="-80" width="40" height="30" fill="#FFF" stroke="#000" stroke-width="2"/>
    <rect x="4" y="-80" width="10" height="10" fill="#000" />
    <rect x="24" y="-80" width="10" height="10" fill="#000" />
    <rect x="14" y="-70" width="10" height="10" fill="#000" />
    <rect x="34" y="-70" width="10" height="10" fill="#000" />
    <rect x="4" y="-60" width="10" height="10" fill="#000" />
    <rect x="24" y="-60" width="10" height="10" fill="#000" />
    <text x="24" y="-90" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#B22222" text-anchor="middle">GOAL</text>
  </g>

  <g id="progress-cyclist" transform="translate(300, 410) rotate(-16.7)">
    
    <g stroke="#FF4500" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-35" y1="-25" x2="15" y2="-25" />
      <line x1="-35" y1="-25" x2="-45" y2="15" />
      <line x1="-5" y1="15" x2="-45" y2="15" />
      <line x1="-5" y1="15" x2="-25" y2="-35" />
      <line x1="-5" y1="15" x2="15" y2="-25" />
      <line x1="15" y1="-25" x2="35" y2="15" />
    </g>

    <path d="M 15 -25 L 18 -45 Q 25 -45 28 -38" fill="none" stroke="#333" stroke-width="5" stroke-linecap="round"/>
    
    <path d="M -35 -35 C -30 -35 -20 -35 -15 -35 C -15 -30 -35 -30 -35 -35" fill="#333" stroke="#333" stroke-width="6" stroke-linecap="round"/>

    <g class="wheel" transform="translate(-45, 15)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#333" stroke-width="6"/>
      <circle cx="0" cy="0" r="19" fill="none" stroke="#CCC" stroke-width="2"/>
      <line x1="0" y1="-19" x2="0" y2="19" stroke="#999" stroke-width="1.5"/>
      <line x1="-19" y1="0" x2="19" y2="0" stroke="#999" stroke-width="1.5"/>
      <line x1="-13.4" y1="-13.4" x2="13.4" y2="13.4" stroke="#999" stroke-width="1.5"/>
      <line x1="-13.4" y1="13.4" x2="13.4" y2="-13.4" stroke="#999" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="4" fill="#333"/>
    </g>

    <g class="wheel" transform="translate(35, 15)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#333" stroke-width="6"/>
      <circle cx="0" cy="0" r="19" fill="none" stroke="#CCC" stroke-width="2"/>
      <line x1="0" y1="-19" x2="0" y2="19" stroke="#999" stroke-width="1.5"/>
      <line x1="-19" y1="0" x2="19" y2="0" stroke="#999" stroke-width="1.5"/>
      <line x1="-13.4" y1="-13.4" x2="13.4" y2="13.4" stroke="#999" stroke-width="1.5"/>
      <line x1="-13.4" y1="13.4" x2="13.4" y2="-13.4" stroke="#999" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="4" fill="#333"/>
    </g>

    <g class="crank" transform="translate(-5, 15)">
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#333" stroke-width="4" stroke-linecap="round"/>
      <line x1="-12" y1="0" x2="-18" y2="-35" stroke="#2c3e50" stroke-width="7" stroke-linecap="round"/>
      <line x1="12" y1="0" x2="-10" y2="-35" stroke="#3498db" stroke-width="7" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="5" fill="#666"/>
      <rect x="-15" y="-3" width="6" height="6" fill="#000" rx="1"/>
      <rect x="9" y="-3" width="6" height="6" fill="#000" rx="1"/>
    </g>

    <g class="biker-body">
      <path d="M -25 -35 L -10 -35 L 5 -55 L -15 -65 Z" fill="#ff69b4" />
      <line x1="-15" y1="-65" x2="-10" y2="-35" stroke="#ff1493" stroke-width="2"/>
      
      <path d="M -10 -60 Q 5 -50 20 -42" fill="none" stroke="#ff69b4" stroke-width="6" stroke-linecap="round"/>
      <circle cx="20" cy="-42" r="3" fill="#fAD6b1"/>

      <g transform="translate(-12, -75)">
        <path d="M -10 -5 Q -15 15 -18 25 Q -5 20 0 10 Z" fill="#f4d03f"/>
        <circle cx="0" cy="0" r="14" fill="#fAD6b1"/>
        <circle cx="4" cy="-2" r="1.5" fill="#333"/>
        <circle cx="10" cy="-2" r="1.5" fill="#333"/>
        <path d="M 4 4 Q 7 8 10 4" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M -10 -5 Q -12 -15 0 -16 Q 12 -15 12 -5 C 8 -10 0 -10 -10 -5" fill="#f4d03f"/>
        <path d="M -14 0 Q -10 -18 2 -18 Q 14 -18 14 -5 Q 10 -10 4 -10 Q 0 -10 -14 0" fill="#f4d03f"/>
        <path d="M -12 -8 Q -16 5 -15 18 Q -8 10 -10 -2 Z" fill="#f4d03f"/>
      </g>
    </g>
  </g>
</svg>